# YouTube Factory — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d                    # start (CPU)
#   docker compose --profile gpu up -d      # start (NVIDIA GPU)
#   docker exec youtube-factory ytfactory setup
#   docker exec youtube-factory ytfactory doctor
#   docker exec youtube-factory ytfactory build <project-id>
# ─────────────────────────────────────────────────────────────────────────────

services:
  youtube-factory:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: youtube-factory:latest
    container_name: youtube-factory
    restart: unless-stopped

    # .env file is bind-mounted so API keys are never baked into the image
    env_file:
      - .env

    # Named volumes persist across image rebuilds
    volumes:
      # Bind mount (not a named volume) so job outputs land directly in
      # ./workspace on the host — browsable/copyable without `docker cp`.
      - ./workspace:/app/workspace
      - cache:/app/cache
      - models:/app/models
      - logs:/app/logs
      # env_file only injects vars into the process env — it does NOT put an
      # actual .env file on disk. ytfactory's setup check looks for a literal
      # /app/.env file, so bind-mount it explicitly as well.
      - ./.env:/app/.env:ro
      # Optional: mount local music library
      # - ./music:/app/workspace/music:ro

    # Image's ENTRYPOINT is set to `ytfactory`, which overrides `command`
    # unless we clear it here — otherwise Docker runs `ytfactory python -c ...`
    # and fails with "No such command 'python'".
    entrypoint: []

    # Keep the container running for exec-based usage
    command: ['python', '-c', 'import time; time.sleep(1e9)']

    # Resource limits (adjust for your hardware)
    deploy:
      resources:
        limits:
          memory: 8G

  # ── GPU variant ──────────────────────────────────────────────────────────
  youtube-factory-gpu:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: youtube-factory:latest
    container_name: youtube-factory
    restart: unless-stopped
    profiles:
      - gpu

    env_file:
      - .env

    environment:
      - WHISPERX_DEVICE=cuda

    volumes:
      - ./workspace:/app/workspace
      - cache:/app/cache
      - models:/app/models
      - logs:/app/logs
      - ./.env:/app/.env:ro

    entrypoint: []
    command: ['python', '-c', 'import time; time.sleep(1e9)']

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  cache:
    name: ytfactory_cache
  models:
    name: ytfactory_models
  logs:
    name: ytfactory_logs
