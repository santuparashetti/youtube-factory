channel_name: "Atma Theory"

opening:
  enabled: true
  template: |
    Welcome to Atma Theory...
    where ancient wisdom meets modern life.

closing:
  enabled: true
  template: |
    This is Atma Theory.

cta:
  enabled: true
  template: |
    If this reflection stayed with you,
    consider joining us on this journey.

